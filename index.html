<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>流体力学知识库</title>
  <meta name="description" content="系统掌握流体力学理论与前沿研究">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">

  <!-- Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css">

  <style>
    :root {
      --base-font-size: 16px;
    }
    .app-name-link { font-size: 1.1rem; }
    .markdown-section { max-width: 900px; }
    /* Math */
    .katex { font-size: 1.1em; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>

  <script>
    window.$docsify = {
      name: '🌊 流体力学知识库',
      repo: 'https://github.com/zhanghongfeix/first-fluid-profile',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索...',
        noData: '没有找到结果',
        paths: 'auto'
      },
      // KaTeX 数学公式支持
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (content) {
            return content;
          });
        }
      ],
      // 深色模式
      darklight: {
        dark: false,
        light: true
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>

  <!-- KaTeX -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css">
  <script src="//cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
</body>
</html>
